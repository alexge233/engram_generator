<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engram Logo</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            gap: 24px;
        }
        canvas { image-rendering: pixelated; border-radius: 16px; }
        .sizes { display: flex; gap: 32px; align-items: flex-end; }
        .label {
            color: #8888a0; font-family: 'Courier New', monospace;
            font-size: 11px; text-align: center; margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="sizes">
    <div>
        <canvas id="logo-lg" width="64" height="64" style="width:256px;height:256px"></canvas>
        <div class="label">256px</div>
    </div>
    <div>
        <canvas id="logo-md" width="48" height="48" style="width:128px;height:128px"></canvas>
        <div class="label">128px</div>
    </div>
    <div>
        <canvas id="logo-sm" width="32" height="32" style="width:64px;height:64px"></canvas>
        <div class="label">64px</div>
    </div>
</div>

<script>
class EngramLogo {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d", { willReadFrequently: false });
        this.ctx.imageSmoothingEnabled = false;
        this.size = canvas.width;
        this.time = 0;

        // 4D hypercube (tesseract): 16 vertices, 32 edges
        this.vertices4d = [];
        for (let i = 0; i < 16; i++) {
            this.vertices4d.push([
                (i & 1) ? 1 : -1,
                (i & 2) ? 1 : -1,
                (i & 4) ? 1 : -1,
                (i & 8) ? 1 : -1,
            ]);
        }

        // Edges: connect vertices that differ in exactly one coordinate
        this.edges = [];
        for (let i = 0; i < 16; i++) {
            for (let j = i + 1; j < 16; j++) {
                let diff = 0;
                for (let k = 0; k < 4; k++) {
                    if (this.vertices4d[i][k] !== this.vertices4d[j][k]) diff++;
                }
                if (diff === 1) {
                    this.edges.push({ from: i, to: j, trace: 0 });
                }
            }
        }

        this.nodes = this.vertices4d.map((_, i) => ({ brightness: 0 }));
        // Interior neurons: random points inside the hypercube
        this.neurons = [];
        this.neuronEdges = [];
        const numNeurons = 30;
        for (let i = 0; i < numNeurons; i++) {
            this.neurons.push({
                pos: [
                    (Math.random() - 0.5) * 1.6,
                    (Math.random() - 0.5) * 1.6,
                    (Math.random() - 0.5) * 1.6,
                    (Math.random() - 0.5) * 1.6,
                ],
                brightness: 0,
            });
        }

        // Connect neurons to nearby neurons and to hypercube vertices
        for (let i = 0; i < numNeurons; i++) {
            // Connect to 2-3 nearest neurons
            const dists = [];
            for (let j = 0; j < numNeurons; j++) {
                if (i === j) continue;
                let d = 0;
                for (let k = 0; k < 4; k++) {
                    d += (this.neurons[i].pos[k] - this.neurons[j].pos[k]) ** 2;
                }
                dists.push({ j, d: Math.sqrt(d) });
            }
            dists.sort((a, b) => a.d - b.d);
            for (let c = 0; c < 3; c++) {
                // Avoid duplicate edges
                const a = i, b = dists[c].j;
                const exists = this.neuronEdges.some(
                    e => (e.from === a && e.to === b) || (e.from === b && e.to === a)
                );
                if (!exists) {
                    this.neuronEdges.push({ from: a, to: b, trace: 0 });
                }
            }

            // Connect to nearest hypercube vertex
            let bestV = 0, bestD = Infinity;
            for (let v = 0; v < 16; v++) {
                let d = 0;
                for (let k = 0; k < 4; k++) {
                    d += (this.neurons[i].pos[k] - this.vertices4d[v][k]) ** 2;
                }
                if (d < bestD) { bestD = d; bestV = v; }
            }
            this.neuronEdges.push({ from: i, to: bestV + numNeurons, trace: 0, bridge: true });
        }

        this.signals = [];
        for (let i = 0; i < 4; i++) this._launchSignal();
    }

    _launchSignal() {
        // Start from a hypercube vertex or interior neuron
        const useNeuron = Math.random() < 0.5;
        const start = useNeuron
            ? Math.floor(Math.random() * this.neurons.length)
            : Math.floor(Math.random() * 16);
        this.signals.push({
            node: start,
            isNeuron: useNeuron,
            color: Math.random() < 0.33 ? 0 : Math.random() < 0.5 ? 1 : 2,
            age: 0,
        });
    }

    _step() {
        const newSignals = [];
        const nN = this.neurons.length;

        for (const sig of this.signals) {
            sig.age++;
            if (sig.age > 16) continue;

            if (sig.isNeuron) {
                // Find edges from this neuron
                const outEdges = this.neuronEdges
                    .map((e, i) => ({ ...e, idx: i }))
                    .filter(e => e.from === sig.node || e.to === sig.node);

                const count = Math.random() < 0.35 ? 2 : 1;
                const shuffled = outEdges.sort(() => Math.random() - 0.5);

                for (let i = 0; i < Math.min(count, shuffled.length); i++) {
                    const edge = shuffled[i];
                    this.neuronEdges[edge.idx].trace = 1.0;

                    const nextRaw = edge.from === sig.node ? edge.to : edge.from;
                    if (nextRaw >= nN) {
                        // Jumped to hypercube vertex
                        const vIdx = nextRaw - nN;
                        this.nodes[vIdx].brightness = 1.0;
                        newSignals.push({ node: vIdx, isNeuron: false, color: sig.color, age: sig.age });
                    } else {
                        this.neurons[sig.node].brightness = 1.0;
                        this.neurons[nextRaw].brightness = 0.7;
                        newSignals.push({ node: nextRaw, isNeuron: true, color: sig.color, age: sig.age });
                    }
                }
            } else {
                // Hypercube vertex: travel along hypercube edges or jump to neuron
                const jumpToNeuron = Math.random() < 0.3;

                if (jumpToNeuron) {
                    // Find bridge edges to this vertex
                    const bridges = this.neuronEdges
                        .map((e, i) => ({ ...e, idx: i }))
                        .filter(e => e.bridge && (e.to === sig.node + nN || e.from === sig.node + nN));
                    if (bridges.length > 0) {
                        const be = bridges[Math.floor(Math.random() * bridges.length)];
                        this.neuronEdges[be.idx].trace = 1.0;
                        const nIdx = be.from < nN ? be.from : be.to;
                        if (nIdx < nN) {
                            this.neurons[nIdx].brightness = 1.0;
                            newSignals.push({ node: nIdx, isNeuron: true, color: sig.color, age: sig.age });
                        }
                        continue;
                    }
                }

                const outEdges = this.edges
                    .map((e, i) => ({ ...e, idx: i }))
                    .filter(e => e.from === sig.node || e.to === sig.node);

                const count = Math.random() < 0.25 ? 2 : 1;
                const shuffled = outEdges.sort(() => Math.random() - 0.5);

                for (let i = 0; i < Math.min(count, shuffled.length); i++) {
                    const edge = shuffled[i];
                    this.edges[edge.idx].trace = 1.0;
                    this.nodes[edge.from].brightness = 1.0;
                    this.nodes[edge.to].brightness = 1.0;

                    const next = edge.from === sig.node ? edge.to : edge.from;
                    newSignals.push({ node: next, isNeuron: false, color: sig.color, age: sig.age });
                }
            }
        }

        this.signals = newSignals;
        if (Math.random() < 0.12) this._launchSignal();
    }

    _decay() {
        for (const e of this.edges) e.trace *= 0.95;
        for (const e of this.neuronEdges) e.trace *= 0.94;
        for (const n of this.nodes) n.brightness *= 0.93;
        for (const n of this.neurons) n.brightness *= 0.92;
    }

    _rotate4d(v, a1, a2, a3, a4, a5, a6) {
        let [x, y, z, w] = v;
        // XY rotation
        let c = Math.cos(a1), s = Math.sin(a1);
        [x, y] = [x*c - y*s, x*s + y*c];
        // XZ rotation
        c = Math.cos(a2); s = Math.sin(a2);
        [x, z] = [x*c - z*s, x*s + z*c];
        // XW rotation
        c = Math.cos(a3); s = Math.sin(a3);
        [x, w] = [x*c - w*s, x*s + w*c];
        // YZ rotation
        c = Math.cos(a4); s = Math.sin(a4);
        [y, z] = [y*c - z*s, y*s + z*c];
        // YW rotation
        c = Math.cos(a5); s = Math.sin(a5);
        [y, w] = [y*c - w*s, y*s + w*c];
        // ZW rotation
        c = Math.cos(a6); s = Math.sin(a6);
        [z, w] = [z*c - w*s, z*s + w*c];
        return [x, y, z, w];
    }

    _project(v4) {
        // Stereographic projection from 4D to 3D, then perspective to 2D
        const [x, y, z, w] = v4;
        const d4 = 3;
        const scale4 = d4 / (d4 - w);
        const x3 = x * scale4;
        const y3 = y * scale4;
        const z3 = z * scale4;

        const d3 = 6;
        const scale3 = d3 / (d3 + z3);
        return {
            sx: x3 * scale3,
            sy: y3 * scale3,
            depth: z3,
            w: w,
            scale: scale3 * scale4,
        };
    }

    draw() {
        this.time += 0.008;
        if (Math.floor(this.time * 125) % 3 === 0) this._step();
        this._decay();

        const ctx = this.ctx;
        const s = this.size;
        const half = s / 2;
        const viewScale = s * 0.18;

        ctx.fillStyle = "#0a0a0f";
        ctx.fillRect(0, 0, s, s);

        // 6 rotation angles for 4D, different speeds for interesting motion
        const a1 = this.time * 0.5;
        const a2 = this.time * 0.3;
        const a3 = this.time * 0.7;
        const a4 = this.time * 0.2;
        const a5 = this.time * 0.4;
        const a6 = this.time * 0.15;

        // Project all vertices
        const projected = this.vertices4d.map(v => {
            const r = this._rotate4d(v, a1, a2, a3, a4, a5, a6);
            const p = this._project(r);
            return {
                sx: half + p.sx * viewScale,
                sy: half + p.sy * viewScale,
                depth: p.depth,
                w: p.w,
                scale: p.scale,
            };
        });

        // Sort edges by average depth (back to front)
        const sortedEdges = this.edges.map((e, i) => ({ ...e, idx: i }));
        sortedEdges.sort((a, b) => {
            const da = (projected[a.from].depth + projected[a.to].depth) / 2;
            const db = (projected[b.from].depth + projected[b.to].depth) / 2;
            return da - db;
        });

        // Draw edges
        for (const edge of sortedEdges) {
            const from = projected[edge.from];
            const to = projected[edge.to];
            const t = edge.trace;
            const avgDepth = (from.depth + to.depth) / 2;
            const depthFade = Math.max(0.15, Math.min(1, 0.5 - avgDepth * 0.15));

            // Determine which 4D dimension this edge spans
            const v1 = this.vertices4d[edge.from];
            const v2 = this.vertices4d[edge.to];
            let dimIdx = 0;
            for (let k = 0; k < 4; k++) {
                if (v1[k] !== v2[k]) { dimIdx = k; break; }
            }

            // Color by dimension: x=cyan, y=blue, z=magenta, w=purple
            const dimColors = [
                [0, 212, 255],
                [68, 136, 255],
                [204, 68, 255],
                [140, 80, 255],
            ];

            if (t < 0.01) {
                const dc = dimColors[dimIdx];
                ctx.strokeStyle = `rgba(${dc[0]*0.15},${dc[1]*0.15},${dc[2]*0.15},${0.3 * depthFade})`;
                ctx.lineWidth = Math.max(0.5, viewScale * 0.015);
            } else {
                const dc = dimColors[dimIdx];
                const r = Math.round(dc[0] * t);
                const g = Math.round(dc[1] * t);
                const b = Math.round(dc[2] * t);
                ctx.strokeStyle = `rgba(${r},${g},${b},${(0.4 + t * 0.6) * depthFade})`;
                ctx.lineWidth = Math.max(0.5, viewScale * (0.02 + t * 0.04));
                ctx.shadowColor = `rgba(${r},${g},${b},${t * depthFade})`;
                ctx.shadowBlur=0;
            }

            ctx.beginPath();
            ctx.moveTo(from.sx, from.sy);
            ctx.lineTo(to.sx, to.sy);
            ctx.stroke();
            ctx.shadowBlur=0;
        }

        // Sort nodes by depth
        const sortedNodes = projected.map((p, i) => ({ ...p, i }));
        sortedNodes.sort((a, b) => a.depth - b.depth);

        // Draw nodes
        for (const pn of sortedNodes) {
            const b = this.nodes[pn.i].brightness;
            const depthFade = Math.max(0.2, Math.min(1, 0.5 - pn.depth * 0.15));
            const nodeSize = viewScale * (0.04 + pn.scale * 0.03 + b * 0.03);

            const cr = Math.round((15 + b * 230) * depthFade);
            const cg = Math.round((15 + b * 210) * depthFade);
            const cb = Math.round((30 + b * 225) * depthFade);

            if (b > 0.1) {
                ctx.shadowColor = `rgba(${cr},${cg},${cb},${b * depthFade})`;
                ctx.shadowBlur=0;
            }

            ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
            ctx.fillRect(
                Math.round(pn.sx - nodeSize / 2),
                Math.round(pn.sy - nodeSize / 2),
                Math.round(nodeSize),
                Math.round(nodeSize)
            );

            if (b > 0.4) {
                ctx.fillStyle = `rgba(255,255,255,${b * 0.5 * depthFade})`;
                const cs = nodeSize * 0.4;
                ctx.fillRect(
                    Math.round(pn.sx - cs / 2),
                    Math.round(pn.sy - cs / 2),
                    Math.round(cs),
                    Math.round(cs)
                );
            }

            ctx.shadowBlur=0;
        }

        // Project interior neurons
        const projNeurons = this.neurons.map(n => {
            const r = this._rotate4d(n.pos, a1, a2, a3, a4, a5, a6);
            const p = this._project(r);
            return {
                sx: half + p.sx * viewScale,
                sy: half + p.sy * viewScale,
                depth: p.depth,
                scale: p.scale,
            };
        });

        // Draw interior neuron edges
        for (const edge of this.neuronEdges) {
            const t = edge.trace;
            let from, to;
            const nN = this.neurons.length;

            if (edge.bridge) {
                const nIdx = edge.from < nN ? edge.from : edge.to;
                const vIdx = (edge.from >= nN ? edge.from : edge.to) - nN;
                from = projNeurons[nIdx];
                to = projected[vIdx];
            } else {
                from = projNeurons[edge.from];
                to = projNeurons[edge.to];
            }

            const avgDepth = (from.depth + to.depth) / 2;
            const depthFade = Math.max(0.1, Math.min(1, 0.5 - avgDepth * 0.15));

            if (t < 0.01) {
                ctx.strokeStyle = `rgba(20, 20, 35, ${0.25 * depthFade})`;
                ctx.lineWidth = Math.max(0.3, viewScale * 0.008);
            } else {
                const r = Math.round(100 * t);
                const g = Math.round(220 * t);
                const b = Math.round(180 * t);
                ctx.strokeStyle = `rgba(${r},${g},${b},${(0.3 + t * 0.6) * depthFade})`;
                ctx.lineWidth = Math.max(0.3, viewScale * (0.01 + t * 0.025));
                ctx.shadowColor = `rgba(${r},${g},${b},${t * depthFade * 0.6})`;
                ctx.shadowBlur=0;
            }

            ctx.beginPath();
            ctx.moveTo(from.sx, from.sy);
            ctx.lineTo(to.sx, to.sy);
            ctx.stroke();
            ctx.shadowBlur=0;
        }

        // Draw interior neuron nodes
        for (let i = 0; i < this.neurons.length; i++) {
            const p = projNeurons[i];
            const b = this.neurons[i].brightness;
            const depthFade = Math.max(0.15, Math.min(1, 0.5 - p.depth * 0.15));
            const nodeSize = viewScale * (0.025 + b * 0.025);

            const cr = Math.round((10 + b * 150) * depthFade);
            const cg = Math.round((20 + b * 230) * depthFade);
            const cb = Math.round((15 + b * 180) * depthFade);

            if (b > 0.1) {
                ctx.shadowColor = `rgba(${cr},${cg},${cb},${b * depthFade})`;
                ctx.shadowBlur=0;
            }

            ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
            ctx.fillRect(
                Math.round(p.sx - nodeSize / 2),
                Math.round(p.sy - nodeSize / 2),
                Math.round(nodeSize),
                Math.round(nodeSize)
            );
            ctx.shadowBlur=0;
        }

        // Signal glow
        for (const sig of this.signals) {
            const p = sig.isNeuron ? projNeurons[sig.node] : projected[sig.node];
            if (!p) continue;
            const pulse = 0.7 + Math.sin(this.time * 50) * 0.3;
            const colors = [
                `rgba(0,255,255,${pulse})`,
                `rgba(255,100,255,${pulse})`,
                `rgba(255,200,50,${pulse})`,
            ];
            const col = colors[sig.color] || colors[0];
            ctx.fillStyle = col;
            ctx.shadowColor = col;
            ctx.shadowBlur=0;
            const sr = viewScale * (sig.isNeuron ? 0.04 : 0.06);
            ctx.fillRect(
                Math.round(p.sx - sr / 2),
                Math.round(p.sy - sr / 2),
                Math.round(sr),
                Math.round(sr)
            );
            ctx.shadowBlur=0;
        }
    }
}

const logos = [
    new EngramLogo(document.getElementById("logo-lg")),
    new EngramLogo(document.getElementById("logo-md")),
    new EngramLogo(document.getElementById("logo-sm")),
];

function animate() {
    for (const logo of logos) logo.draw();
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
