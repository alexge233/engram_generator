<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engram Generator - Skill Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e8;
            --text-dim: #8888a0;
            --cyan: #00d4ff;
            --blue: #4488ff;
            --magenta: #cc44ff;
            --green: #44ff88;
            --red: #ff4466;
            --yellow: #ffcc44;
            --orange: #ff8844;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.6;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 200;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 { font-size: 18px; font-weight: 700; }
        .header h1 a { color: var(--text); text-decoration: none; }
        .header .accent { color: var(--cyan); }

        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .search-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            width: 200px;
            outline: none;
        }
        .search-box:focus { border-color: var(--cyan); }
        .search-box::placeholder { color: var(--text-dim); }

        .filter-btn {
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--text-dim); }
        .filter-btn.active {
            border-color: var(--cyan);
            color: var(--text);
            background: rgba(0, 212, 255, 0.1);
        }

        .tree { padding: 16px 24px 80px; }

        .tier-section { margin-bottom: 24px; }

        .tier-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .tier-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }

        .tier-label { font-weight: 600; font-size: 14px; }
        .tier-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }

        .task-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .task-node {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.12s;
            position: relative;
            border: 2px solid transparent;
        }
        .task-node:hover {
            transform: scale(1.4);
            z-index: 50;
            border-color: #fff;
        }
        .task-node.dimmed { opacity: 0.08; }
        .task-node.selected {
            transform: scale(1.6);
            z-index: 100;
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255,255,255,0.4);
        }
        .task-node.prereq-of {
            border-color: var(--yellow);
            box-shadow: 0 0 8px rgba(255,204,68,0.5);
            transform: scale(1.3);
            z-index: 60;
        }
        .task-node.unlocked-by {
            border-color: var(--green);
            box-shadow: 0 0 8px rgba(68,255,136,0.5);
            transform: scale(1.3);
            z-index: 60;
        }

        .tooltip {
            display: none;
            position: fixed;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            max-width: 280px;
            z-index: 1000;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .tooltip.visible { display: block; }
        .tooltip .tt-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 3px;
        }
        .tooltip .tt-meta { color: var(--text-dim); font-size: 11px; }

        .info-panel {
            display: none;
            position: fixed;
            top: 64px;
            right: 16px;
            width: 280px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            z-index: 300;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-height: calc(100vh - 90px);
            overflow-y: auto;
        }
        .info-panel.visible { display: block; }
        .info-panel .close-btn {
            position: absolute; top: 8px; right: 12px;
            background: none; border: none; color: var(--text-dim);
            font-size: 18px; cursor: pointer;
        }
        .info-panel .task-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: 15px;
            margin-bottom: 6px; padding-right: 24px;
        }
        .info-panel .meta { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
        .info-panel .section-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-dim);
            margin-top: 10px; margin-bottom: 4px;
        }
        .info-panel ul { list-style: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .info-panel .req li { color: var(--yellow); cursor: pointer; padding: 2px 0; }
        .info-panel .unl li { color: var(--green); cursor: pointer; padding: 2px 0; }
        .info-panel li:hover { text-decoration: underline; }

        .legend {
            position: fixed;
            bottom: 12px;
            left: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 10px;
            z-index: 200;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 520px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
        .legend-swatch { width: 10px; height: 10px; border-radius: 3px; }

        @media (max-width: 640px) {
            .header { padding: 10px 12px; }
            .tree { padding: 12px; }
            .task-node { width: 18px; height: 18px; }
            .info-panel { width: 240px; right: 8px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1><a href="index.html">Engram <span class="accent">Skill Tree</span></a></h1>
    <nav style="display:flex;gap:12px;align-items:center;font-size:13px">
        <a href="index.html" style="color:var(--text-dim);text-decoration:none">Home</a>
        <a href="samples.html" style="color:var(--text-dim);text-decoration:none">Samples</a>
        <a href="graph.html" style="color:var(--text-dim);text-decoration:none">3D Graph</a>
        <a href="https://github.com/alexge233/engram_generator" style="color:var(--text-dim);text-decoration:none">GitHub</a>
    </nav>
    <div class="controls">
        <input type="text" class="search-box" id="search" placeholder="Search 2,022 tasks...">
        <div id="filters"></div>
    </div>
</div>

<div class="tree" id="tree"></div>
<div class="tooltip" id="tooltip"></div>
<div class="info-panel" id="info">
    <button class="close-btn" onclick="closePanel()">&times;</button>
    <div class="task-name" id="info-name"></div>
    <div class="meta" id="info-meta"></div>
    <div class="section-label" id="lbl-req">REQUIRES</div>
    <ul class="req" id="info-req"></ul>
    <div class="section-label" id="lbl-unl">UNLOCKS</div>
    <ul class="unl" id="info-unl"></ul>
</div>
<div class="legend" id="legend"></div>

<script>
const TIER_NAMES = [
    "Fundamentals","Building Blocks","Algebra & Graphs","Real Maths",
    "Applied Science","Expert Territory","Graduate Level","Meta-Reasoning",
    "Creative","Research","Self-Architecture"
];
const TIER_COLORS = [
    "#44ff88","#44ff88","#00d4ff","#00d4ff",
    "#4488ff","#4488ff","#cc44ff","#cc44ff",
    "#ff8844","#ff4466","#ff4466"
];
const DOMAIN_COLORS = {
    "Mathematics":"#00d4ff","Physics":"#4488ff","Computer Science":"#44ff88",
    "Chemistry":"#ffcc44","Biology":"#44ddaa","Engineering":"#ff8844",
    "Quantum":"#cc44ff","Logic":"#aa88ff","Earth & Space":"#88aadd",
    "Social":"#ddaa88","Meta-Reasoning":"#ff4466","Other":"#8888a0",
};

let tasks=[], taskMap={}, reverseMap={}, selectedName=null, activeDomain=null, searchTerm="";

async function init(){
    const d = await (await fetch("tasks.json")).json();
    tasks = d.tasks;
    tasks.forEach(t=>{ taskMap[t.name]=t; reverseMap[t.name]=[]; });
    tasks.forEach(t=>t.prereqs.forEach(p=>{ if(reverseMap[p]) reverseMap[p].push(t.name); }));
    buildLegend();
    buildFilters();
    render();
    document.getElementById("search").addEventListener("input",e=>{
        searchTerm=e.target.value.toLowerCase();
        applyVisibility();
    });
}

function buildLegend(){
    document.getElementById("legend").innerHTML=Object.entries(DOMAIN_COLORS)
        .map(([d,c])=>`<div class="legend-item"><div class="legend-swatch" style="background:${c}"></div>${d}</div>`).join("");
}

function buildFilters(){
    const el=document.getElementById("filters");
    const doms=[...new Set(tasks.map(t=>t.domain))].sort();
    el.innerHTML=`<button class="filter-btn active" data-d="all">All</button>`+
        doms.map(d=>`<button class="filter-btn" data-d="${d}">${d}</button>`).join("");
    el.querySelectorAll(".filter-btn").forEach(b=>b.addEventListener("click",()=>{
        el.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        activeDomain=b.dataset.d==="all"?null:b.dataset.d;
        applyVisibility();
    }));
}

function render(){
    const tiers={};
    tasks.forEach(t=>{ if(!tiers[t.tier]) tiers[t.tier]=[]; tiers[t.tier].push(t); });
    const tree=document.getElementById("tree");
    tree.innerHTML="";

    for(let tier=0;tier<=10;tier++){
        const list=(tiers[tier]||[]).sort((a,b)=>{
            if(a.domain<b.domain) return -1;
            if(a.domain>b.domain) return 1;
            return a.name.localeCompare(b.name);
        });

        const sec=document.createElement("div");
        sec.className="tier-section";
        sec.dataset.tier=tier;

        const hdr=document.createElement("div");
        hdr.className="tier-header";
        const tc=TIER_COLORS[tier];
        hdr.innerHTML=`<div class="tier-badge" style="border-color:${tc};color:${tc}">${tier}</div>`+
            `<div class="tier-label">${TIER_NAMES[tier]}</div>`+
            `<div class="tier-count">${list.length}</div>`;

        const grid=document.createElement("div");
        grid.className="task-grid";

        list.forEach(t=>{
            const node=document.createElement("div");
            node.className="task-node";
            node.id="n-"+t.name;
            node.style.background=DOMAIN_COLORS[t.domain]||"#8888a0";
            node.addEventListener("mouseenter",e=>showTip(e,t));
            node.addEventListener("mouseleave",hideTip);
            node.addEventListener("click",()=>selectNode(t.name));
            grid.appendChild(node);
        });

        sec.appendChild(hdr);
        sec.appendChild(grid);
        tree.appendChild(sec);
    }
}

function applyVisibility(){
    document.querySelectorAll(".task-node").forEach(el=>{
        const name=el.id.slice(2);
        const t=taskMap[name];
        const domOk=!activeDomain||t.domain===activeDomain;
        const srchOk=!searchTerm||name.includes(searchTerm);
        el.classList.toggle("dimmed",!(domOk&&srchOk));
    });
}

function showTip(e,t){
    const tip=document.getElementById("tooltip");
    tip.innerHTML=`<div class="tt-name">${t.name.replace(/_/g," ")}</div>`+
        `<div class="tt-meta">Tier ${t.tier} · ${t.domain} · ${t.pattern.replace(/_/g," ")}</div>`;
    tip.classList.add("visible");
    const x=Math.min(e.clientX+14,window.innerWidth-300);
    const y=Math.min(e.clientY+14,window.innerHeight-80);
    tip.style.left=x+"px";
    tip.style.top=y+"px";
}

function hideTip(){ document.getElementById("tooltip").classList.remove("visible"); }

function selectNode(name){
    // Clear previous
    document.querySelectorAll(".task-node").forEach(n=>n.classList.remove("selected","prereq-of","unlocked-by"));
    selectedName=name;
    const el=document.getElementById("n-"+name);
    if(el) el.classList.add("selected");

    const t=taskMap[name];
    t.prereqs.forEach(p=>{
        const pe=document.getElementById("n-"+p);
        if(pe) pe.classList.add("prereq-of");
    });
    (reverseMap[name]||[]).forEach(u=>{
        const ue=document.getElementById("n-"+u);
        if(ue) ue.classList.add("unlocked-by");
    });

    // Scroll selected into view
    if(el) el.scrollIntoView({behavior:"smooth",block:"center"});

    // Info panel
    const panel=document.getElementById("info");
    document.getElementById("info-name").textContent=name.replace(/_/g," ");
    const tc=TIER_COLORS[t.tier];
    document.getElementById("info-meta").innerHTML=
        `<span style="display:inline-block;padding:2px 8px;border-radius:10px;background:${tc}22;color:${tc};border:1px solid ${tc};font-weight:600;margin-right:6px">Tier ${t.tier}</span>`+
        `${t.domain} · ${t.pattern.replace(/_/g," ")}`;

    const reqEl=document.getElementById("info-req");
    const lblReq=document.getElementById("lbl-req");
    if(t.prereqs.length){
        lblReq.style.display="block"; reqEl.style.display="block";
        reqEl.innerHTML=t.prereqs.map(p=>`<li onclick="selectNode('${p}')">${p.replace(/_/g," ")}</li>`).join("");
    } else { lblReq.style.display="none"; reqEl.style.display="none"; }

    const unlEl=document.getElementById("info-unl");
    const lblUnl=document.getElementById("lbl-unl");
    const unl=reverseMap[name]||[];
    if(unl.length){
        lblUnl.style.display="block"; unlEl.style.display="block";
        unlEl.innerHTML=unl.map(u=>`<li onclick="selectNode('${u}')">${u.replace(/_/g," ")}</li>`).join("");
    } else { lblUnl.style.display="none"; unlEl.style.display="none"; }

    panel.classList.add("visible");
}

function closePanel(){
    document.getElementById("info").classList.remove("visible");
    document.querySelectorAll(".task-node").forEach(n=>n.classList.remove("selected","prereq-of","unlocked-by"));
    selectedName=null;
}

init();
</script>

</body>
</html>
